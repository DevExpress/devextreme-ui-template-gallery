<dx-data-grid
  id="tasks-grid"
  class="theme-dependent"
  height="100%"
  [dataSource]="tasks"
  (onRowClick)="navigateToDetails($event)"
  (onEditingStart)="toogleUseNavigation()"
  (onEditCanceled)="toogleUseNavigation()"
  (onSaved)="toogleUseNavigation()"
  [hoverStateEnabled]="true"
  [columnAutoWidth]="true"
  [showBorders]="true"
>
  <dxo-data-grid-paging [pageSize]="30"></dxo-data-grid-paging>
  <dxo-data-grid-pager [visible]="true"></dxo-data-grid-pager>
  <dxo-data-grid-editing mode="row" [allowUpdating]="true"> </dxo-data-grid-editing>
  <dxo-data-grid-selection
    selectAllMode="allPages"
    showCheckBoxesMode="always"
    mode="multiple"
  ></dxo-data-grid-selection>
  <dxo-data-grid-scrolling mode="virtual"></dxo-data-grid-scrolling>
  <dxo-data-grid-sorting mode="multiple"></dxo-data-grid-sorting>
  <dxo-data-grid-header-filter [visible]="true"></dxo-data-grid-header-filter>

  <dxi-data-grid-column dataField="text" caption="Subject" [hidingPriority]="7">
    <dxi-data-grid-validation-rule type="required"></dxi-data-grid-validation-rule>
  </dxi-data-grid-column>
  <dxi-data-grid-column dataField="company" caption="Company" [hidingPriority]="6">
    <dxi-data-grid-validation-rule type="required"></dxi-data-grid-validation-rule>
  </dxi-data-grid-column>
  <dxi-data-grid-column
    dataField="priority"
    caption="Priority"
    [hidingPriority]="4"
    cellTemplate="cellPriority"
    editCellTemplate="editCellPriority"
  >
    <dxo-data-grid-lookup [dataSource]="priorityList"></dxo-data-grid-lookup>
    <dxi-data-grid-validation-rule type="required"></dxi-data-grid-validation-rule>
  </dxi-data-grid-column>
  <dxi-data-grid-column
    dataField="startDate"
    caption="Start Date"
    dataType="date"
    [hidingPriority]="2"
  >
    <dxi-data-grid-validation-rule type="required"></dxi-data-grid-validation-rule>
  </dxi-data-grid-column>
  <dxi-data-grid-column
    dataField="dueDate"
    caption="Due Date"
    dataType="date"
    sortOrder="asc"
    [hidingPriority]="1"
  >
    <dxi-data-grid-validation-rule type="required"></dxi-data-grid-validation-rule>
  </dxi-data-grid-column>
  <dxi-data-grid-column dataField="owner" caption="Owner" [hidingPriority]="5">
    <dxi-data-grid-validation-rule type="required"></dxi-data-grid-validation-rule>
  </dxi-data-grid-column>
  <dxi-data-grid-column
    dataField="status"
    caption="Status"
    [hidingPriority]="3"
    [minWidth]="120"
    cellTemplate="cellStatus"
    editCellTemplate="editCellStatus"
  >
    <dxo-data-grid-lookup [dataSource]="statusList"></dxo-data-grid-lookup>
    <dxi-data-grid-validation-rule type="required"></dxi-data-grid-validation-rule>
  </dxi-data-grid-column>

  <div *dxTemplate="let cellInfo of 'cellPriority'">
    <status-indicator
      [isField]="false"
      [showBar]="true"
      [value]="cellInfo.data.priority"
    >
    </status-indicator>
  </div>

  <div *dxTemplate="let cellInfo of 'editCellPriority'">
    <dx-select-box
      class="edit-cell"
      [(value)]="cellInfo.value"
      [items]="priorityList"
      (onValueChanged)="cellInfo.setValue($event.value)"
      (onSelectionChanged)="cellInfo.component.updateDimensions()"
      placeholder=""
      [displayExpr]="displayExprFn"
    >
      <dxo-select-box-field-addons beforeTemplate="before"></dxo-select-box-field-addons>
      <div *dxTemplate="let data of 'before'">
        <status-indicator
          [showBar]="true"
          [isField]="false"
          [value]="cellInfo.value"
        ></status-indicator>
      </div>
      <div *dxTemplate="let data of 'item'">
        <status-indicator
          [showBar]="true"
          [isField]="false"
          [value]="data"
        ></status-indicator>
      </div>
    </dx-select-box>
  </div>

  <div *dxTemplate="let cellInfo of 'cellStatus'">
    <status-indicator
      [isField]="false"
      [value]="cellInfo.data.status"
    ></status-indicator>
  </div>

  <div *dxTemplate="let cellInfo of 'editCellStatus'">
    <dx-select-box
      class="edit-cell"
      [(value)]="cellInfo.value"
      [items]="statusList"
      (onValueChanged)="cellInfo.setValue($event.value)"
      (onSelectionChanged)="cellInfo.component.updateDimensions()"
      placeholder=""
      [displayExpr]="displayExprFn"
    >
      <dxo-select-box-field-addons beforeTemplate="before"></dxo-select-box-field-addons>
      <div *dxTemplate="let data of 'before'">
        <status-indicator [isField]="false" [value]="cellInfo.value"></status-indicator>
      </div>
      <div *dxTemplate="let s of 'item'">
        <status-indicator [isField]="false" [value]="s"></status-indicator>
      </div>
    </dx-select-box>
  </div>
</dx-data-grid>
