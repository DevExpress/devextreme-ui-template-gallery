<form class="create-account-form auth-form" (submit)="onSubmit($event)">
  <dx-form
    labelLocation="top"
    [formData]="formData()"
    [showColonAfterLabel]="true"
    [disabled]="loading()"
  >
    <dxi-form-item
      dataField="email"
      editorType="dxTextBox"
      [editorOptions]="{
        placeholder: 'Email',
        stylingMode: 'filled',
        mode: 'email'
      }"
    >
      <dxi-form-validation-rule
        type="required"
        message="Email is required"
      ></dxi-form-validation-rule>
      <dxi-form-validation-rule
        type="email"
        message="Email is invalid"
      ></dxi-form-validation-rule>
      <dxo-form-label text="Email"></dxo-form-label>
    </dxi-form-item>

    <dxi-form-item
      dataField="password"
      editorType="dxTextBox"
      [editorOptions]="{
        stylingMode: 'filled',
        mode: 'password'
      }"
    >
      <dxi-form-validation-rule
        type="required"
        message="Password is required"
      ></dxi-form-validation-rule>
      <dxo-form-label text="Password"></dxo-form-label>
    </dxi-form-item>

    <dxi-form-item
      dataField="confirmedPassword"
      editorType="dxTextBox"
      [editorOptions]="{
        stylingMode: 'filled',
        mode: 'password'
      }"
    >
      <dxi-form-validation-rule
        type="required"
        message="Password is required"
      ></dxi-form-validation-rule>
      <dxi-form-validation-rule
        type="custom"
        message="Passwords do not match"
        [validationCallback]="confirmPassword"
      >
      </dxi-form-validation-rule>
      <dxo-form-label text="Confirm Password"></dxo-form-label>
    </dxi-form-item>

    <dxi-form-item>
      <div class="policy-info">
        By creating an account, you agree to the
        <a [routerLink]="redirectLink">Terms of Service</a> and
        <a [routerLink]="redirectLink">Privacy Policy</a>
      </div>
    </dxi-form-item>

    <dxi-form-item itemType="button">
      <dxo-form-button-options
        width="100%"
        type="default"
        [useSubmitBehavior]="true"
        [template]="'createAccountTemplate'"
      >
      </dxo-form-button-options>
    </dxi-form-item>

    <ng-container *dxTemplate="let item of 'createAccountTemplate'">
      <span class="dx-button-text">
        @if (loading()) {
          <dx-load-indicator
            width="24px"
            height="24px"
            [visible]="true"
          ></dx-load-indicator>
        } @else {
          Register
        }
      </span>
    </ng-container>
  </dx-form>
  <div class="login-link">
    Have an account? <a [routerLink]="redirectLink">Sign In</a>
  </div>
  <app-login-oauth></app-login-oauth>
</form>
