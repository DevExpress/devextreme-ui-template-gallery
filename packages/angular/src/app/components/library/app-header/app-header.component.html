<header>
  <dx-toolbar class="header-toolbar">
    @if (menuToggleEnabled) {
      <dxi-toolbar-item
        location="before"
        widget="dxButton"
        cssClass="menu-button"
        [options]="{
        icon: 'menu',
        stylingMode: 'text',
        onClick: toggleMenu
      }"
      >
      </dxi-toolbar-item>
    }
    @if (title) {
      <dxi-toolbar-item
        location="before"
        cssClass="header-title"
        [text]="title"
      >
      </dxi-toolbar-item>
    }

    <dxi-toolbar-item
      location="after"
      widget="dxTextBox"
      locateInMenu="auto"
      cssClass="global-search-box"
      [options]="{
        stylingMode: 'filled',
        mode: 'search',
        placeholder: 'Search',
        width: 180
      }"
    >
    </dxi-toolbar-item>
    <dxi-toolbar-item location="after" locateInMenu="never">
      <div *dxTemplate>
        <theme-switcher></theme-switcher>
      </div>
    </dxi-toolbar-item>

    <dxi-toolbar-item location="after">
      <div *dxTemplate>
        <div class="messages">
          <dx-button icon="belloutline" stylingMode="text"> </dx-button>
          <div class="dx-badge"> 4 </div>
        </div>
      </div>
    </dxi-toolbar-item>

    <dxi-toolbar-item location="after" locateInMenu="auto" menuItemTemplate="menuItem">
      <div *dxTemplate>
        <user-panel
          [user]="user"
          [menuItems]="userMenuItems"
          menuMode="context"
        ></user-panel>
      </div>
    </dxi-toolbar-item>
    <div *dxTemplate="let data of 'menuItem'">
      <user-panel
        [user]="user"
        [menuItems]="userMenuItems"
        menuMode="list"
      ></user-panel>
    </div>
  </dx-toolbar>
</header>
