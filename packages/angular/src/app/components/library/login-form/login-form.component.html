<form class="login-form" (submit)="onSubmit($event)">
  <dx-form
    labelLocation="top"
    [formData]="formData()"
    [disabled]="loading()"
    [showColonAfterLabel]="true"
  >
    <dxi-form-item
      dataField="email"
      editorType="dxTextBox"
      [editorOptions]="{
        stylingMode: 'filled',
        mode: 'email'
      }"
    >
      <dxi-form-validation-rule
        type="required"
        message="Email is required"
      ></dxi-form-validation-rule>
      <dxi-form-validation-rule
        type="email"
        message="Email is invalid"
      ></dxi-form-validation-rule>
      <dxo-form-label text="Email"></dxo-form-label>
    </dxi-form-item>

    <dxi-form-item
      dataField="password"
      editorType="dxTextBox"
      [editorOptions]="passwordEditorOptions"
    >
      <dxi-form-validation-rule
        type="required"
        message="Password is required"
      ></dxi-form-validation-rule>
      <dxo-form-label text="Password"></dxo-form-label>
    </dxi-form-item>

    <dxi-form-item
      dataField="rememberMe"
      editorType="dxCheckBox"
      [editorOptions]="{
        text: 'Remember me',
        elementAttr: { class: 'form-text' }
      }"
    >
      <dxo-form-label [visible]="false"></dxo-form-label>
    </dxi-form-item>

    <dxi-form-item itemType="button">
      <dxo-form-button-options
        width="100%"
        type="default"
        cssClass="btn-sign-in"
        [useSubmitBehavior]="true"
        [template]="'signInTemplate'"
      >
      </dxo-form-button-options>
    </dxi-form-item>

    <ng-container *dxTemplate="let item of 'signInTemplate'">
      <span class="dx-button-text">
        @if (loading()) {
          <dx-load-indicator
            width="24px"
            height="24px"
            [visible]="true"
          ></dx-load-indicator>
        } @else {
          Sign In
        }
      </span>
    </ng-container>
  </dx-form>

  <div class="reset-link">
    <a [routerLink]="resetLink">Forgot password?</a>
  </div>

  <dx-button
    class="btn-create-account"
    text="Register"
    [stylingMode]="btnStylingMode()"
    width="100%"
    (onClick)="onCreateAccountClick()"
  >
  </dx-button>

  <app-login-oauth></app-login-oauth>
</form>
