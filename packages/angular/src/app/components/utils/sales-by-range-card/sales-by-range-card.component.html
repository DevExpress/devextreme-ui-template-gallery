<card-analytics
  titleText="Sales by Date Range"
  contentClass="sales-by-category"
>
  <dx-pie-chart
    class="sales-pie"
    [dataSource]="data"
    type="doughnut"
    [diameter]="0.8"
    [innerRadius]="0.6"
  >
    <dxi-pie-chart-series argumentField="name" valueField="value">
      <dxo-pie-chart-label
        backgroundColor="none"
        [radialOffset]="-20"
        [visible]="true"
        [customizeText]="customizeSaleText"
      >
        <dxo-pie-chart-font color="#757575" [size]="15"></dxo-pie-chart-font>
      </dxo-pie-chart-label>
    </dxi-pie-chart-series>

    <dxo-pie-chart-legend>
      <dxo-pie-chart-margin [top]="70"></dxo-pie-chart-margin>
    </dxo-pie-chart-legend>

    <dxo-pie-chart-size [height]="270"></dxo-pie-chart-size>

    <dxo-pie-chart-legend [visible]="false"></dxo-pie-chart-legend>
  </dx-pie-chart>

  <dx-chart class="sales-bars" [dataSource]="data" [rotated]="true">
    <dxo-chart-common-axis-settings [visible]="false">
      <dxo-chart-tick [visible]="false"></dxo-chart-tick>
    </dxo-chart-common-axis-settings>

    <dxo-chart-legend [visible]="false"></dxo-chart-legend>

    <dxo-chart-common-series-settings
      argumentField="name"
      valueField="value"
      type="bar"
      [ignoreEmptyPoints]="true"
    >
    </dxo-chart-common-series-settings>

    <dxo-chart-series-template nameField="name"> </dxo-chart-series-template>

    <dxo-value-axis>
      <dxo-chart-label>
        <dxo-chart-format type="largeNumber"></dxo-chart-format>
      </dxo-chart-label>
    </dxo-value-axis>
  </dx-chart>
</card-analytics>
