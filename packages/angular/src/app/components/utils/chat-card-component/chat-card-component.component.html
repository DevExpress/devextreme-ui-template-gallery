<section class="chat-card-component">
  <div class="chat-card-component__header">
    <div class="chat-card-component__title-section">
      <span class="chat-card-icon dx-icon dx-icon-sparkle" aria-hidden="true"></span>
      <div class="chat-card-component__title-content">
        <div class="chat-card-component__title">AI Data Insights</div>
      </div>
    </div>

    <div class="chat-card-component__actions">
      <dx-button
        icon="clearformat"
        stylingMode="text"
        hint="Reset chat"
        (onClick)="resetClick.emit()"
      ></dx-button>
      <dx-button
        icon="unpin"
        stylingMode="text"
        hint="Unpin"
        (onClick)="unpinClick.emit()"
      ></dx-button>
      <dx-button
        icon="close"
        stylingMode="text"
        hint="Close chat"
        (onClick)="closeClick.emit()"
      ></dx-button>
    </div>
  </div>

  <div class="chat-card-component__body">
    <dx-chat
      [class]="'chat-card-component__chat' + (isProcessing ? ' chat-disabled' : '')"
      [user]="currentUser"
      [items]="messages"
      [typingUsers]="typingUsers"
      [alerts]="alerts"
      height="100%"
      emptyViewTemplate="emptyView"
      messageTemplate="messageTemplate"
      [showAvatar]="false"
      [showDayHeaders]="false"
      (onMessageEntered)="messageEntered.emit($event)"
    >
      <div *dxTemplate="let data of 'emptyView'" class="chat-card-component__empty-wrapper">
        <chat-empty-view
          [texts]="data.texts"
          (promptClick)="promptClick.emit($event)"
        ></chat-empty-view>
      </div>
      <div *dxTemplate="let data of 'messageTemplate'">
        <chat-message-render [text]="data.message?.text || ''"></chat-message-render>
      </div>
    </dx-chat>
  </div>
</section>
