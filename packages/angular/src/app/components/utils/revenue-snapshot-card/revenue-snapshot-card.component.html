<card-analytics
  titleText="Revenue Snapshot (All Products)"
  contentClass="sales-by-category"
>
  <dx-pie-chart
    [dataSource]="data"
    type="doughnut"
    [diameter]="0.8"
    [innerRadius]="0.6"
  >
    <dxi-pie-chart-series argumentField="name" valueField="value">
      <dxo-pie-chart-label
        backgroundColor="none"
        [radialOffset]="-20"
        [visible]="true"
        [customizeText]="customizeSaleText"
      >
        <dxo-pie-chart-font color="#757575" [size]="15"></dxo-pie-chart-font>
      </dxo-pie-chart-label>
    </dxi-pie-chart-series>

    <dxo-pie-chart-legend>
      <dxo-pie-chart-margin [top]="70"></dxo-pie-chart-margin>
    </dxo-pie-chart-legend>

    <dxo-pie-chart-size [height]="270"> </dxo-pie-chart-size>
  </dx-pie-chart>
</card-analytics>
