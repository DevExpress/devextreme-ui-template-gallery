<dx-text-box
  stylingMode="filled"
  valueChangeEvent="keyup input change"
  [label]="label"
  [(value)]="value"
  [readOnly]="!isEditing"
  [mask]="mask ?? ''"
  [elementAttr]="{ class: 'form-editor' }"
  [inputAttr]="{ class: 'form-editor-input' }"
  (onValueChanged)="valueChanged($event)"
>
  <dx-validator [validationRules]="validators"></dx-validator>
  @if (icon) {
    <dxi-text-box-button
      name="icon"
      location="before"
      [options]="{
      icon: icon,
      elementAttr: { class: 'form-editor-icon' },
      stylingMode: 'text'
    }"
    ></dxi-text-box-button>
  }
</dx-text-box>
