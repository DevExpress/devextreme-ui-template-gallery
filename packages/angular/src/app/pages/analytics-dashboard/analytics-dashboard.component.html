<dx-scroll-view class="view-wrapper-scroll">
  <div class="view-wrapper view-wrapper-dashboard">
    <toolbar-analytics
      titleText="Dashboard"
      [panelItems]="analyticsPanelItems"
      [selectedItems]="[5]"
      (selectionChanged)="selectionChange($event)"
    >
    </toolbar-analytics>

    <ng-template #dashboardContent>
      <div class="analytics-dashboard__content">
        <div class="cards grey">
          <opportunities-ticker [data]="opportunities()"></opportunities-ticker>
          <revenue-total-ticker [data]="sales()"></revenue-total-ticker>
          <conversion-ticker></conversion-ticker>
          <leads-ticker></leads-ticker>
        </div>

        <div class="cards">
          <revenue-card [data]="sales()"></revenue-card>
          <conversion-card [data]="opportunities()"></conversion-card>
          <revenue-analysis-card [data]="salesByState()"></revenue-analysis-card>
          <revenue-snapshot-card [data]="salesByCategory()"></revenue-snapshot-card>
        </div>
      </div>
    </ng-template>

    <div class="analytics-dashboard__layout">
      @if (usesSplitterLayout()) {
        <dx-splitter
          class="analytics-dashboard__splitter"
          orientation="horizontal"
          [separatorSize]="12"
        >
          <dxi-splitter-item minSize="0" [resizable]="true">
            <div class="analytics-dashboard__pane analytics-dashboard__pane--main">
              <ng-container *ngTemplateOutlet="dashboardContent"></ng-container>
            </div>
          </dxi-splitter-item>
          <dxi-splitter-item
            [size]="420"
            [minSize]="340"
            maxSize="50%"
            [resizable]="true"
          >
            <div class="analytics-dashboard__pane analytics-dashboard__pane--chat">
              <chat-card-component
                [messages]="chat.messages"
                [currentUser]="chat.currentUser"
                [typingUsers]="chat.typingUsers"
                [alerts]="chat.alerts"
                [isProcessing]="chat.isProcessing"
                (messageEntered)="chat.onMessageEntered($event)"
                (promptClick)="chat.onPromptClick($event)"
                (resetClick)="chat.resetChat()"
                (closeClick)="chat.closeChat()"
                (unpinClick)="chat.unpinChat()"
              ></chat-card-component>
            </div>
          </dxi-splitter-item>
        </dx-splitter>
      } @else {
        <ng-container *ngTemplateOutlet="dashboardContent"></ng-container>
        @if (!chat.isPinned && !chat.isPopupVisible) {
          <chat-floating-button
            (buttonClick)="chat.openPopup()"
          ></chat-floating-button>
        }
      }

      <chat-popup
        [visible]="chat.isPopupVisible"
        (visibleChange)="chat.changePopupVisibility($event)"
        [messages]="chat.messages"
        [currentUser]="chat.currentUser"
        [typingUsers]="chat.typingUsers"
        [alerts]="chat.alerts"
        [isProcessing]="chat.isProcessing"
        (messageEntered)="chat.onMessageEntered($event)"
        (promptClick)="chat.onPromptClick($event)"
        (resetClick)="chat.resetChat()"
        (pinClick)="chat.pinChat()"
      ></chat-popup>
    </div>
  </div>
</dx-scroll-view>
<dx-load-panel
  container=".view-wrapper"
  [position]="{ of: '.content' }"
  [visible]="isLoading()"
  [showPane]="true"
></dx-load-panel>
